<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>个人导航</title>
<link rel="icon" href="favicon.ico">
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<header class="top-bar">
  <div class="top-bar-inner">
    <div class="logo" onclick="toggleSimpleMode()">个人导航</div>

    <div class="search-wrapper">
      <div class="search-engine-select" id="engineSelect">
        <button class="engine-btn active" data-engine="baidu">百度</button>
        <button class="engine-btn" data-engine="google">Google</button>
        <button class="engine-btn" data-engine="bing">必应</button>
        <button class="engine-btn" data-engine="sogou">搜狗</button>
        <button class="engine-btn" data-engine="duckduckgo">Duck</button>
        <button class="engine-btn" data-engine="local">本站</button>
      </div>
      <div class="search-box" style="position: relative;">
        <input type="text" class="search-input" id="searchInput" placeholder="搜索网站或输入关键词..." autofocus>
        <button class="search-btn" id="searchBtn">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
            <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
          </svg>
        </button>
        <div class="search-history" id="searchHistory">
          <div class="search-history-header">
            <span class="search-history-title">搜索历史</span>
            <span class="search-history-clear" id="clearHistory">清空</span>
          </div>
          <div id="searchHistoryList"></div>
        </div>
      </div>
    </div>

    <div class="top-actions">
      <button class="icon-btn" id="wallpaperBtn" title="切换壁纸">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
          <rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="m21 15-5-5L5 21"/>
        </svg>
      </button>
      <button class="icon-btn" id="themeBtn" title="切换主题">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
          <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
        </svg>
      </button>
    </div>
  </div>
</header>

<div class="app-layout">
  <!-- 侧栏遮罩 -->
  <div class="panel-overlay" id="panelOverlay" onclick="togglePanel()"></div>

  <!-- 左侧面板 -->
  <aside class="side-panel" id="sidePanel">
    <div class="panel-scroll">
      <!-- 时钟 -->
      <div class="widget">
        <div class="widget-title">时钟</div>
        <div class="clock-container">
          <canvas id="clockCanvas" width="200" height="200"></canvas>
          <div class="clock-date" id="clockDate"></div>
        </div>
      </div>

      <!-- 日历 -->
      <div class="widget">
        <div class="widget-title">日历</div>
        <div class="cal-compact" id="calCompact"></div>
      </div>
    </div>
  </aside>

  <!-- 主内容区 -->
  <main class="main-content">
    <nav class="category-nav" id="categoryNav"></nav>
    <div id="contentArea"></div>
  </main>
</div>

<!-- 壁纸选择 -->
<div class="wp-overlay" id="wpOverlay" onclick="closeWallpaperPicker()"></div>
<div class="wallpaper-picker" id="wpPicker">
  <h3>选择壁纸</h3>
  <div class="wp-grid" id="wpGrid"></div>
  <div class="wp-upload" id="wpUpload">
    <input type="file" accept="image/*" id="wpFileInput" style="display:none">
    + 上传自定义图片
  </div>
</div>

<!-- 简洁模式 -->
<div class="simple-overlay" id="simpleOverlay" onclick="toggleSimpleMode()">
  <div class="simple-time" id="simpleTime"></div>
  <div class="simple-date" id="simpleDate"></div>
  <div class="simple-search-wrapper" onclick="event.stopPropagation()">
    <div class="simple-search-box">
      <input type="text" class="simple-search-input" id="simpleSearchInput" placeholder="搜索..." autofocus>
      <button class="simple-search-btn" id="simpleSearchBtn">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
          <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
        </svg>
      </button>
    </div>
  </div>
</div>

<footer class="footer">
  <p>个人导航 &mdash; 快速访问常用网站</p>
</footer>

<div class="context-menu" id="contextMenu">
  <div class="context-menu-item" data-action="copy">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
    <span>复制链接</span>
  </div>
  <div class="context-menu-item" data-action="open-new">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
    <span>新标签页打开</span>
  </div>
  <div class="context-menu-divider"></div>
  <div class="context-menu-item favorite" data-action="favorite">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
    <span>收藏此网站</span>
  </div>
</div>

<script src="js/lunar.js"></script>
<script src="js/app.js"></script>

</body>
</html>
